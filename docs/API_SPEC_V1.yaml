openapi: 3.0.3
info:
  title: CryptoOrder Journal API
  version: 1.0.0
  description: Phase 1 API for trade journal closed loop.
servers:
  - url: /api
paths:
  /journals:
    get:
      summary: List journals
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: side
          schema: { type: string, enum: [long, short] }
        - in: query
          name: tag
          schema: { type: string }
        - in: query
          name: pnl
          schema: { type: string, enum: [positive, negative] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Journal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalListResponse'

  /journals/{id}:
    get:
      summary: Get journal detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Journal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetail'
        '404':
          description: Not found

  /journals/{id}/note:
    patch:
      summary: Update journal note
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetail'
        '400':
          description: Validation error

  /reviews/daily:
    get:
      summary: Get daily review summary
      parameters:
        - in: query
          name: date
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Daily summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReviewSummary'

components:
  schemas:
    Journal:
      type: object
      required: [id, symbol, side, realizedPnl, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        symbol: { type: string }
        side: { type: string, enum: [long, short] }
        entryPrice: { type: number }
        exitPrice: { type: number }
        qty: { type: number }
        fee: { type: number }
        realizedPnl: { type: number }
        durationSec: { type: integer }
        mae: { type: number, nullable: true }
        mfe: { type: number, nullable: true }
        status: { type: string, enum: [draft, completed] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    JournalNote:
      type: object
      properties:
        setupTags:
          type: array
          items: { type: string }
        entryReason: { type: string, nullable: true }
        emotion: { type: string, enum: [calm, fomo, revenge, fear, greed], nullable: true }
        executionScore: { type: integer, minimum: 1, maximum: 5, nullable: true }
        lessonsLearned: { type: string, nullable: true }
        planSl: { type: number, nullable: true }
        actualSl: { type: number, nullable: true }

    JournalDetail:
      allOf:
        - $ref: '#/components/schemas/Journal'
        - type: object
          properties:
            note:
              $ref: '#/components/schemas/JournalNote'

    JournalListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Journal'
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        summary:
          type: object
          properties:
            winRate: { type: number }
            netPnl: { type: number }
            avgPnl: { type: number }
            maxDrawdown: { type: number }

    UpdateNoteRequest:
      type: object
      required: [setupTags, executionScore]
      properties:
        setupTags:
          type: array
          minItems: 1
          items: { type: string }
        entryReason: { type: string }
        emotion: { type: string, enum: [calm, fomo, revenge, fear, greed] }
        executionScore: { type: integer, minimum: 1, maximum: 5 }
        lessonsLearned: { type: string }
        planSl: { type: number }
        actualSl: { type: number }

    DailyReviewSummary:
      type: object
      properties:
        date: { type: string, format: date }
        totalTrades: { type: integer }
        winRate: { type: number }
        netPnl: { type: number }
        maxSingleLoss: { type: number }
        topErrorPattern: { type: string, nullable: true }
